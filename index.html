<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="index.js"></script>
  </head>
  <body class="bg-[#F8FAFC]">
    <header
      class="max-w-11/12 lg:max-w-10/12 mx-auto border text-center md:text-left py-3 lg:py-6"
    >
      <h1 class="text-2xl *: lg:text-5xl font-bold">Job Application Tracker</h1>
      <section class="job-info-section flex gap-3 pt-6">
        <div class="card card-dash bg-base-100 w-full">
          <div class="card-body">
            <h2 class="card-title text-xl">Total</h2>
            <p class="font-bold text-xl">12</p>
          </div>
        </div>
        <div class="card card-dash bg-base-100 w-full">
          <div class="card-body">
            <h2 class="card-title text-xl">Interview</h2>
            <p class="text-green-500 font-bold text-xl">12</p>
          </div>
        </div>
        <div class="card card-dash bg-base-100 w-full">
          <div class="card-body">
            <h2 class="card-title text-xl">Rejected</h2>
            <p class="text-red-500 font-bold text-xl">12</p>
          </div>
        </div>

        <!-- <div
          id="job-info-card"
          class="w-full bg-white shadow-[0px_1px_1px_rgba(0,0,0,0.35)]"
        >
          <p>Interview</p>
          <p>0</p>
        </div>
        <div
          id="job-info-card"
          class="w-full bg-white shadow-[0px_1px_1px_rgba(0,0,0,0.35)]"
        >
          <p>Rejected</p>
          <p>0</p>
        </div> -->
      </section>
    </header>
  </body>
</html>
