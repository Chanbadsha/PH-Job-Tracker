<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <link rel="shortcut icon" href="./assets/job.webp" type="image/x-icon" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#F8FAFC] min-h-screen">
    <header
      class="max-w-11/12 lg:max-w-10/12 mx-auto text-center md:text-left py-3 lg:py-6"
    >
      <h1 class="text-2xl *: lg:text-5xl font-bold">Job Application Tracker</h1>
      <section class="job-info-section flex gap-3 pt-6">
        <div class="card card-dash min-w-5 bg-base-100 w-full">
          <div class="card-body flex items-center">
            <h2 class="card-title text-base md:text-xl">Total</h2>
            <p id="totalJobNumberShow" class="font-bold text-xl">0</p>
          </div>
        </div>
        <div class="card card-dash min-w-5 bg-base-100 w-full">
          <div class="card-body flex items-center">
            <h2 class="card-title text-base md:text-xl">Interview</h2>
            <p
              id="interviewJobNumberShow"
              class="text-green-500 font-bold text-xl"
            >
              0
            </p>
          </div>
        </div>
        <div class="card card-dash min-w-5 bg-base-100 w-full">
          <div class="card-body flex items-center">
            <h2 class="card-title text-base md:text-xl">Rejected</h2>
            <p
              id="rejectedJobNumberShow"
              class="text-red-500 font-bold text-xl"
            >
              0
            </p>
          </div>
        </div>
      </section>
    </header>

    <main class="max-w-11/12 lg:max-w-10/12 mx-auto pt-12">
      <section class="flex justify-between">
        <h3 class="font-semibold text-xl lg:text-2xl">Available Jobs</h3>
        <p id="job-count">0 Jobs</p>
      </section>

      <!-- Toggle Btn -->
      <section class="flex justify-center gap-3 md:justify-start pt-6">
        <button
          id="allJobBtn"
          onclick="toggleBtn('allJobBtn')"
          class="btn btn-primary rounded-lg px-6 md:px-12 hover:bg-blue-800 hover:text-white"
        >
          All
        </button>
        <button
          id="interviewJobBtn"
          onclick="toggleBtn('interviewJobBtn')"
          class="btn rounded-lg px-6 md:px-12 hover:bg-blue-800 hover:text-white"
        >
          Interview
        </button>
        <button
          id="rejectedJobBtn"
          onclick="toggleBtn('rejectedJobBtn')"
          class="btn rounded-lg px-6 md:px-12 hover:bg-blue-800 hover:text-white"
        >
          Rejected
        </button>
      </section>

      <!-- All Jobs Section -->
      <section
        id="allJobs"
        class="allJobsSection py-6 flex flex-col gap-6"
      ></section>

      <!-- InterView Jobs Section -->
      <section
        id="interviewJobSection"
        class="py-6 flex flex-col gap-6"
      ></section>
      <!-- Rejected Jobs Section -->
      <section
        id="rejectedJobSection"
        class="py-6 flex flex-col gap-6"
      ></section>
    </main>

    <script src="./script/utils.js"></script>
    <script src="./script/index.js"></script>
  </body>
</html>
